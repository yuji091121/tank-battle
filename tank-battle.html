<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}
#gameWrapper {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}
canvas {
  border: 3px solid #e94560;
  background: #0f0f1a;
  display: block;
  outline: none;
  cursor: crosshair;
}
#sidebar {
  background: #16213e;
  border: 2px solid #e94560;
  border-radius: 12px;
  padding: 20px;
  color: #eee;
  min-width: 180px;
  text-align: center;
}
#sidebar h2 {
  color: #e94560;
  margin-bottom: 15px;
  font-size: 22px;
  letter-spacing: 3px;
}
#sidebar .stat {
  margin: 12px 0;
  font-size: 16px;
}
#sidebar .stat span {
  color: #f5c518;
  font-weight: bold;
  font-size: 20px;
}
#sidebar .key-hint {
  margin-top: 20px;
  font-size: 12px;
  color: #888;
  line-height: 1.8;
}
#sidebar .key-hint b {
  color: #e94560;
}
#gameOverMsg {
  color: #e94560;
  font-size: 18px;
  font-weight: bold;
  margin-top: 15px;
  display: none;
}
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas" tabindex="0"></canvas>
  <div id="sidebar">
    <h2>坦 克 大 战</h2>
    <div class="stat">🏆 得分 <br><span id="score">0</span></div>
    <div class="stat">🛡️ 生命 <br><span id="lives">3</span></div>
    <div class="stat">💀 击杀 <br><span id="kills">0</span></div>
    <div id="gameOverMsg">游戏结束<br>按 R 重新开始</div>
    <div class="key-hint">
      <b>↑↓←→</b> 移动<br>
      <b>空格 / J</b> 射击<br>
      <b>R</b> 重新开始
    </div>
  </div>
</div>

<script>
(function() {
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 聚焦canvas以捕获键盘事件
canvas.focus();
canvas.addEventListener('click', () => canvas.focus());

const TILE = 32;
const COLS = 18;
const ROWS = 18;
canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

// ---- Game State ----
let score, lives, kills, gameOver, gameWon;
let player, enemies, bullets, walls, particles, muzzleFlashes;
let wave, enemiesRemaining;

// ---- DOM refs ----
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const killsEl = document.getElementById('kills');
const gameOverMsg = document.getElementById('gameOverMsg');

// ---- Direction vectors ----
const DIR = {
  UP:    { x: 0,  y: -1, a: -Math.PI/2 },
  DOWN:  { x: 0,  y: 1,  a: Math.PI/2  },
  LEFT:  { x: -1, y: 0,  a: Math.PI    },
  RIGHT: { x: 1,  y: 0,  a: 0           }
};

// ---- Tank class ----
class Tank {
  constructor(cx, cy, dir, color, isPlayer = false) {
    this.cx = cx;
    this.cy = cy;
    this.dir = dir;
    this.color = color;
    this.isPlayer = isPlayer;
    this.speed = isPlayer ? 2.5 : 1.2;
    this.size = 13;
    this.alive = true;
    this.shootCooldown = 0;
    this.aiDirTimer = 0;
  }

  get x() { return this.cx * TILE + TILE / 2; }
  get y() { return this.cy * TILE + TILE / 2; }

  collidesAt(px, py) {
    const half = this.size;
    const corners = [
      { x: px - half, y: py - half },
      { x: px + half, y: py - half },
      { x: px - half, y: py + half },
      { x: px + half, y: py + half }
    ];
    for (const c of corners) {
      const col = Math.floor(c.x / TILE);
      const row = Math.floor(c.y / TILE);
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return true;
      const w = walls[row][col];
      if (w === 1 || w === 2) return true;
    }
    const allTanks = [...enemies, player].filter(t => t !== this && t.alive);
    for (const t of allTanks) {
      const dx = px - t.x;
      const dy = py - t.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < this.size + t.size) return true;
    }
    return false;
  }

  move(dir) {
    if (!this.alive || gameOver) return false;
    const dx = dir.x * this.speed;
    const dy = dir.y * this.speed;
    const nx = this.x + dx;
    const ny = this.y + dy;
    if (this.collidesAt(nx, ny)) return false;
    this.cx = (nx - TILE/2) / TILE;
    this.cy = (ny - TILE/2) / TILE;
    this.dir = dir;
    return true;
  }

  shoot() {
    if (!this.alive || gameOver || this.shootCooldown > 0) return;
    const bx = this.x + this.dir.x * (this.size + 6);
    const by = this.y + this.dir.y * (this.size + 6);
    bullets.push(new Bullet(bx, by, this.dir, this.isPlayer));
    this.shootCooldown = this.isPlayer ? 12 : 45;
    // 枪口闪光
    muzzleFlashes.push(new MuzzleFlash(this.x, this.y, this.dir));
  }

  update() {
    if (this.shootCooldown > 0) this.shootCooldown--;
  }

  draw(ctx) {
    if (!this.alive) return;
    const x = this.x;
    const y = this.y;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(this.dir.a);

    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);

    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-this.size - 4, -this.size, 8, this.size * 2);
    ctx.fillRect(this.size - 4, -this.size, 8, this.size * 2);

    ctx.fillStyle = '#ddd';
    ctx.fillRect(-3, -this.size - 10, 6, this.size + 6);

    ctx.fillStyle = this.isPlayer ? '#4ecca3' : '#e94560';
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

// ---- Bullet class ----
class Bullet {
  constructor(x, y, dir, fromPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.fromPlayer = fromPlayer;
    this.speed = 6;
    this.alive = true;
    this.trail = [];
  }

  update() {
    // 保存轨迹
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 8) this.trail.shift();

    this.x += this.dir.x * this.speed;
    this.y += this.dir.y * this.speed;
    const col = Math.floor(this.x / TILE);
    const row = Math.floor(this.y / TILE);
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) {
      this.alive = false;
      return;
    }
    const w = walls[row][col];
    if (w === 1) {
      walls[row][col] = 0;
      spawnParticles(col * TILE + TILE/2, row * TILE + TILE/2, '#d4a574');
      this.alive = false;
    } else if (w === 2) {
      spawnParticles(this.x, this.y, '#aaa');
      this.alive = false;
    }
  }

  draw(ctx) {
    // 拖尾效果
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const alpha = (i / this.trail.length) * 0.5;
      const size = 2 + (i / this.trail.length) * 3;
      ctx.fillStyle = this.fromPlayer
        ? `rgba(78, 204, 163, ${alpha})`
        : `rgba(233, 69, 96, ${alpha})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    // 弹头
    ctx.fillStyle = this.fromPlayer ? '#ffdd57' : '#ff4757';
    ctx.shadowColor = this.fromPlayer ? '#4ecca3' : '#e94560';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ---- MuzzleFlash class ----
class MuzzleFlash {
  constructor(x, y, dir) {
    this.x = x + dir.x * 20;
    this.y = y + dir.y * 20;
    this.life = 5;
    this.maxLife = 5;
  }
  update() { this.life--; }
  draw(ctx) {
    if (this.life <= 0) return;
    const alpha = this.life / this.maxLife;
    const r = 12 * alpha;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    grad.addColorStop(0, 'rgba(255, 255, 200, 1)');
    grad.addColorStop(0.4, 'rgba(255, 200, 50, 0.7)');
    grad.addColorStop(1, 'rgba(255, 100, 0, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ---- Particle class ----
class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 15 + Math.random() * 10;
    this.size = 2 + Math.random() * 3;
  }
  update() { this.x += this.vx; this.y += this.vy; this.life--; }
  draw(ctx) {
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.life / 25;
    ctx.fillRect(this.x, this.y, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    particles.push(new Particle(x, y, color));
  }
}

// ---- Map definitions ----
function buildMap() {
  const w = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

  for (let r = 0; r < ROWS; r++) {
    w[r][0] = 2;
    w[r][COLS - 1] = 2;
  }
  for (let c = 0; c < COLS; c++) {
    w[0][c] = 2;
    w[ROWS - 1][c] = 2;
  }

  const patterns = [
    [2,2,1],[3,2,1],[4,2,1],[2,3,1],[3,3,1],[2,4,1],
    [13,2,1],[14,2,1],[15,2,1],[14,3,1],[15,3,1],[15,4,1],
    [2,13,1],[3,13,1],[4,13,1],[2,14,1],[3,14,1],[2,15,1],
    [13,13,1],[14,13,1],[15,13,1],[15,14,1],[14,14,1],[15,15,1],
    [8,7,1],[9,7,1],[8,8,1],[9,8,1],[8,9,1],[9,9,1],[8,10,1],[9,10,1],
    [4,7,1],[4,8,1],[4,9,1],[4,10,1],[5,7,2],[5,8,2],[5,9,2],[5,10,2],
    [12,7,1],[12,8,1],[12,9,1],[12,10,1],[13,7,2],[13,8,2],[13,9,2],[13,10,2],
    [7,4,1],[8,4,1],[9,4,1],[10,4,1],[7,5,2],[8,5,2],[9,5,2],[10,5,2],
    [7,12,1],[8,12,1],[9,12,1],[10,12,1],[7,13,2],[8,13,2],[9,13,2],[10,13,2],
    [6,6,1],[11,6,1],[6,11,1],[11,11,1],
    [3,9,1],[3,8,1],[14,9,1],[14,8,1],
    [7,6,1],[10,6,1],[7,11,1],[10,11,1],
    [4,5,1],[13,5,1],[4,12,1],[13,12,1],
    [5,4,1],[12,4,1],[5,13,1],[12,13,1],
    [6,4,2],[11,4,2],[6,13,2],[11,13,2],
    [3,6,2],[14,6,2],[3,11,2],[14,11,2],
  ];

  for (const [c, r, type] of patterns) {
    if (r > 0 && r < ROWS - 1 && c > 0 && c < COLS - 1) {
      w[r][c] = type;
    }
  }

  return w;
}

// ---- Draw map ----
function drawWalls() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * TILE;
      const y = r * TILE;
      if (walls[r][c] === 1) {
        ctx.fillStyle = '#c97a3b';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#a05a2c';
        ctx.fillRect(x, y, TILE/2, TILE/2);
        ctx.fillRect(x + TILE/2, y + TILE/2, TILE/2, TILE/2);
        ctx.strokeStyle = '#8b4513';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
      } else if (walls[r][c] === 2) {
        ctx.fillStyle = '#7a7a7a';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#999';
        ctx.fillRect(x + 3, y + 3, TILE - 6, TILE - 6);
        ctx.fillStyle = '#555';
        ctx.fillRect(x + 12, y + 12, 5, 5);
      }
    }
  }
}

// ---- Spawn enemy ----
function spawnEnemy() {
  const spawnPoints = [
    { c: 1, d: DIR.RIGHT },
    { c: COLS - 2, d: DIR.LEFT },
    { c: Math.floor(COLS / 2), d: DIR.DOWN }
  ];
  const sp = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
  const colors = ['#e94560', '#ff6b6b', '#c0392b', '#e74c3c', '#ff4757'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const enemy = new Tank(sp.c, 1, sp.d, color, false);
  if (!enemy.collidesAt(enemy.x, enemy.y)) {
    enemies.push(enemy);
    enemiesRemaining++;
  }
}

// ---- Init / Reset ----
function initGame() {
  walls = buildMap();
  player = new Tank(Math.floor(COLS / 2), ROWS - 2, DIR.UP, '#4ecca3', true);
  enemies = [];
  bullets = [];
  particles = [];
  muzzleFlashes = [];
  score = 0;
  lives = 3;
  kills = 0;
  wave = 1;
  gameOver = false;
  gameWon = false;
  enemiesRemaining = 0;
  gameOverMsg.style.display = 'none';
  updateUI();
  for (let i = 0; i < 4; i++) spawnEnemy();
  canvas.focus();
}

function updateUI() {
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  killsEl.textContent = kills;
}

// ---- Input ----
const keys = {};

// 使用 keydown + keyup 组合，并在事件中直接处理射击
// 这样可以避免空格键滚动问题
window.addEventListener('keydown', function(e) {
  // 阻止空格键和方向键的默认行为（滚动）
  if (e.code === 'Space' || e.code.startsWith('Arrow') ||
      e.code === 'KeyW' || e.code === 'KeyA' || e.code === 'KeyS' || e.code === 'KeyD' ||
      e.code === 'KeyJ' || e.code === 'KeyR') {
    e.preventDefault();
  }

  keys[e.code] = true;

  // R键重新开始
  if (e.code === 'KeyR' && gameOver) {
    initGame();
    return;
  }
});

window.addEventListener('keyup', function(e) {
  if (e.code === 'Space' || e.code.startsWith('Arrow') ||
      e.code === 'KeyW' || e.code === 'KeyA' || e.code === 'KeyS' || e.code === 'KeyD' ||
      e.code === 'KeyJ') {
    e.preventDefault();
  }
  keys[e.code] = false;
});

function handleInput() {
  if (!player || !player.alive || gameOver) return;

  if (keys['ArrowUp'] || keys['KeyW']) {
    player.move(DIR.UP);
  }
  if (keys['ArrowDown'] || keys['KeyS']) {
    player.move(DIR.DOWN);
  }
  if (keys['ArrowLeft'] || keys['KeyA']) {
    player.move(DIR.LEFT);
  }
  if (keys['ArrowRight'] || keys['KeyD']) {
    player.move(DIR.RIGHT);
  }
  // 空格 或 J键 射击
  if (keys['Space'] || keys['KeyJ']) {
    player.shoot();
  }
}

// ---- Enemy AI ----
function updateEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    e.update();

    if (e.shootCooldown <= 0 && Math.random() < 0.025) {
      e.shoot();
    }

    e.aiDirTimer--;
    if (e.aiDirTimer <= 0) {
      const dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      let preferred;
      if (Math.abs(dx) > Math.abs(dy)) {
        preferred = dx > 0 ? DIR.RIGHT : DIR.LEFT;
      } else {
        preferred = dy > 0 ? DIR.DOWN : DIR.UP;
      }
      if (Math.random() < 0.4) {
        e.move(preferred);
      }
      const rd = dirs[Math.floor(Math.random() * 4)];
      e.move(rd);
      e.aiDirTimer = 20 + Math.floor(Math.random() * 40);
    } else {
      if (!e.move(e.dir)) {
        const dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
        e.move(dirs[Math.floor(Math.random() * 4)]);
      }
    }
  }
}

// ---- Collision detection ----
function checkCollisions() {
  for (const b of bullets) {
    if (!b.alive) continue;

    if (b.fromPlayer) {
      for (const e of enemies) {
        if (!e.alive) continue;
        const dx = b.x - e.x;
        const dy = b.y - e.y;
        if (Math.sqrt(dx*dx + dy*dy) < e.size + 6) {
          e.alive = false;
          b.alive = false;
          spawnParticles(e.x, e.y, e.color);
          score += 100;
          kills++;
          enemiesRemaining--;
          updateUI();
          break;
        }
      }
    } else {
      if (player.alive) {
        const dx = b.x - player.x;
        const dy = b.y - player.y;
        if (Math.sqrt(dx*dx + dy*dy) < player.size + 6) {
          player.alive = false;
          b.alive = false;
          spawnParticles(player.x, player.y, '#4ecca3');
          lives--;
          updateUI();
          if (lives <= 0) {
            gameOver = true;
            gameOverMsg.style.display = 'block';
          } else {
            setTimeout(() => {
              if (!gameOver) {
                player.cx = Math.floor(COLS / 2);
                player.cy = ROWS - 2;
                player.dir = DIR.UP;
                player.alive = true;
                player.shootCooldown = 0;
                canvas.focus();
              }
            }, 1500);
          }
        }
      }
    }
  }
}

// ---- Wave management ----
function checkWave() {
  const aliveEnemies = enemies.filter(e => e.alive).length;
  if (aliveEnemies === 0 && enemiesRemaining <= 0) {
    wave++;
    if (wave > 5) {
      gameWon = true;
      gameOver = true;
      gameOverMsg.textContent = '你赢了!\n按 R 重新开始';
      gameOverMsg.style.display = 'block';
    } else {
      const count = 4 + wave * 2;
      for (let i = 0; i < count; i++) {
        setTimeout(() => { if (!gameOver) spawnEnemy(); }, i * 300);
      }
    }
  }
}

// ---- Game Loop ----
function update() {
  if (gameOver) return;
  handleInput();
  player.update();
  updateEnemies();

  for (const b of bullets) b.update();
  checkCollisions();

  for (const p of particles) p.update();
  for (const mf of muzzleFlashes) mf.update();

  bullets = bullets.filter(b => b.alive);
  enemies = enemies.filter(e => e.alive);
  particles = particles.filter(p => p.life > 0);
  muzzleFlashes = muzzleFlashes.filter(mf => mf.life > 0);

  checkWave();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.strokeRect(c * TILE, r * TILE, TILE, TILE);
    }
  }

  drawWalls();

  for (const p of particles) p.draw(ctx);
  for (const b of bullets) b.draw(ctx);
  for (const mf of muzzleFlashes) mf.draw(ctx);
  for (const e of enemies) e.draw(ctx);
  player.draw(ctx);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px "Courier New"';
  ctx.fillText('第 ' + wave + ' 波', 10, 20);

  // 弹药就绪指示器
  if (player.alive && player.shootCooldown <= 0) {
    ctx.fillStyle = '#4ecca3';
    ctx.font = '12px "Courier New"';
    ctx.fillText('🔫 就绪', canvas.width - 70, 20);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

initGame();
gameLoop();

})();
</script>
</body>
</html>
