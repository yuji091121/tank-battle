<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}
#gameWrapper { display: flex; gap: 20px; align-items: flex-start; }
canvas {
  border: 3px solid #e94560;
  background: #0f0f1a;
  display: block;
  outline: none;
  cursor: crosshair;
}
#sidebar {
  background: #16213e;
  border: 2px solid #e94560;
  border-radius: 12px;
  padding: 20px;
  color: #eee;
  min-width: 200px;
  text-align: center;
}
#sidebar h2 { color: #e94560; margin-bottom: 10px; font-size: 22px; letter-spacing: 3px; }
#sidebar .stat { margin: 8px 0; font-size: 14px; }
#sidebar .stat span { color: #f5c518; font-weight: bold; font-size: 18px; }
#xpContainer { margin: 10px 0; }
#xpLabel { font-size: 11px; color: #aaa; margin-bottom: 2px; }
#xpBarOuter {
  width: 100%; height: 10px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid #555;
}
#xpBarInner {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #4ecca3, #f5c518);
  border-radius: 5px;
  transition: width 0.3s;
}
#xpText { font-size: 10px; color: #aaa; margin-top: 2px; }
#sidebar .key-hint { margin-top: 15px; font-size: 11px; color: #888; line-height: 1.8; }
#sidebar .key-hint b { color: #e94560; }
#gameOverMsg { color: #e94560; font-size: 16px; font-weight: bold; margin-top: 10px; display: none; }
#waveMsg {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: #f5c518;
  font-size: 36px;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  text-shadow: 0 0 20px rgba(245, 197, 24, 0.5);
}
#levelUpMsg {
  position: fixed;
  top: 40%; left: 50%;
  transform: translate(-50%, -50%);
  color: #4ecca3;
  font-size: 28px;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  text-shadow: 0 0 15px rgba(78, 204, 163, 0.6);

</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas" tabindex="0"></canvas>
  <div id="sidebar">
    <h2>坦 克 大 战</h2>
    <div class="stat">🏆 得分 <br><span id="score">0</span></div>
    <div class="stat">🛡️ 玩家HP <br><span id="lives">3</span></div>
    <div id="xpContainer">
      <div id="xpLabel">⭐ 经验 Lv.<span id="xpLevel">1</span></div>
      <div id="xpBarOuter"><div id="xpBarInner"></div></div>
      <div id="xpText">0 / 100</div>
    </div>
    <div class="stat">💀 击杀 <br><span id="kills">0</span></div>
    <div id="gameOverMsg">游戏结束<br>按 R 重新开始</div>
    <div class="key-hint">
      <b>↑↓←→</b> 移动<br>
      <b>空格 / J</b> 射击<br>
      <b>R</b> 重新开始<br>
      <span style="color:#f5c518">捡 ⭐ 升级加命!</span>
    </div>
  </div>
</div>
<div id="waveMsg"></div>
<div id="levelUpMsg"></div>

<script>
(function() {
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const waveMsg = document.getElementById('waveMsg');
const levelUpMsg = document.getElementById('levelUpMsg');

canvas.focus();
canvas.addEventListener('click', () => canvas.focus());

const TILE = 28;
const COLS = 22;
const ROWS = 22;
canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

// ---- Game State ----
let score, kills, gameOver, gameWon;
let player, enemies, teammates, bullets, walls, particles, muzzleFlashes, xpOrbs;
let wave, enemiesRemaining;
let gamePaused = false;

// ---- DOM refs ----
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const killsEl = document.getElementById('kills');
const gameOverMsg = document.getElementById('gameOverMsg');
const xpBarInner = document.getElementById('xpBarInner');
const xpText = document.getElementById('xpText');
const xpLevelEl = document.getElementById('xpLevel');

// ---- Teams ----
const TEAM = { PLAYER: 1, ENEMY: 2 };

// ---- Direction vectors ----
const DIR = {
  UP:    { x: 0,  y: -1, a: -Math.PI/2 },
  DOWN:  { x: 0,  y: 1,  a: Math.PI/2  },
  LEFT:  { x: -1, y: 0,  a: Math.PI    },
  RIGHT: { x: 1,  y: 0,  a: 0           }
};

// ---- XP Orb class ----
class XPOrb {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.value = 25 + Math.floor(Math.random() * 50); // 25-74 XP
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.03 + Math.random() * 0.04;
  }
  update() {
    this.pulse += this.pulseSpeed;
  }
  draw(ctx) {
    const radius = 7 + Math.sin(this.pulse) * 2;
    // 光晕
    const grad = ctx.createRadialGradient(this.x, this.y, radius * 0.3, this.x, this.y, radius * 1.8);
    grad.addColorStop(0, 'rgba(255, 215, 0, 0.9)');
    grad.addColorStop(0.5, 'rgba(255, 200, 50, 0.4)');
    grad.addColorStop(1, 'rgba(255, 180, 0, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius * 1.8, 0, Math.PI * 2);
    ctx.fill();
    // 核心
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // 星形
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + (radius * 1.5) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⭐', this.x, this.y);
    ctx.textBaseline = 'alphabetic';
  }
}

// ---- Tank class ----
class Tank {
  constructor(cx, cy, dir, color, team, hp = 1) {
    this.cx = cx;
    this.cy = cy;
    this.dir = dir;
    this.color = color;
    this.team = team;
    this.maxHp = hp;
    this.hp = hp;
    this.isPlayer = (team === TEAM.PLAYER && hp >= 3);
    this.speed = this.isPlayer ? 2.5 : (team === TEAM.PLAYER ? 1.5 : 0.8);
    this.size = 12;
    this.alive = true;
    this.shootCooldown = 0;
    this.aiDirTimer = 0;
    this.hitFlash = 0;
    // XP system (only for main player)
    if (this.isPlayer) {
      this.xp = 0;
      this.xpLevel = 1;
      this.xpToNext = 100;
    }
  }

  get x() { return this.cx * TILE + TILE / 2; }
  get y() { return this.cy * TILE + TILE / 2; }

  addXP(amount) {
    if (!this.isPlayer) return;
    this.xp += amount;
    while (this.xp >= this.xpToNext) {
      this.xp -= this.xpToNext;
      this.xpLevel++;
      this.xpToNext = Math.floor(this.xpToNext * 1.5);
      // 升级奖励：+1 最大生命（上限6）
      if (this.maxHp < 6) {
        this.maxHp++;
        this.hp = Math.min(this.hp + 1, this.maxHp);
      }
      // 显示升级提示
      showLevelUp(this.xpLevel);
    }
    updateXPBar();
  }

  collidesAt(px, py) {
    const half = this.size;
    const corners = [
      { x: px - half, y: py - half },
      { x: px + half, y: py - half },
      { x: px - half, y: py + half },
      { x: px + half, y: py + half }
    ];
    for (const c of corners) {
      const col = Math.floor(c.x / TILE);
      const row = Math.floor(c.y / TILE);
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return true;
      const w = walls[row][col];
      if (w === 1 || w === 2) return true;
    }
    const allTanks = [...enemies, ...teammates, player].filter(t => t !== this && t.alive);
    for (const t of allTanks) {
      const dx = px - t.x;
      const dy = py - t.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < this.size + t.size) return true;
    }
    return false;
  }

  move(dir) {
    if (!this.alive || gameOver || gamePaused) return false;
    const dx = dir.x * this.speed;
    const dy = dir.y * this.speed;
    const nx = this.x + dx;
    const ny = this.y + dy;
    if (this.collidesAt(nx, ny)) return false;
    this.cx = (nx - TILE/2) / TILE;
    this.cy = (ny - TILE/2) / TILE;
    this.dir = dir;
    return true;
  }

  shoot() {
    if (!this.alive || gameOver || gamePaused || this.shootCooldown > 0) return;
    const bx = this.x + this.dir.x * (this.size + 6);
    const by = this.y + this.dir.y * (this.size + 6);
    bullets.push(new Bullet(bx, by, this.dir, this.team));
    this.shootCooldown = this.isPlayer ? 12 : (this.team === TEAM.PLAYER ? 25 : 55);
    muzzleFlashes.push(new MuzzleFlash(this.x, this.y, this.dir));
  }

  takeDamage() {
    this.hp--;
    this.hitFlash = 8;
    if (this.hp <= 0) {
      this.alive = false;
      return true;
    }
    return false;
  }

  update() {
    if (this.shootCooldown > 0) this.shootCooldown--;
    if (this.hitFlash > 0) this.hitFlash--;
  }

  draw(ctx) {
    if (!this.alive) return;
    const x = this.x;
    const y = this.y;

    // HP条
    if (this.maxHp > 1) {
      const barW = this.size * 2 + 8;
      const barH = 4;
      const barY = y - this.size - 20;
      ctx.fillStyle = '#333';
      ctx.fillRect(x - barW/2, barY, barW, barH);
      const hpRatio = this.hp / this.maxHp;
      const hpColor = hpRatio > 0.6 ? '#4ecca3' : hpRatio > 0.3 ? '#f5c518' : '#e94560';
      ctx.fillStyle = hpColor;
      ctx.fillRect(x - barW/2, barY, barW * hpRatio, barH);
    }

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(this.dir.a);

    if (this.hitFlash > 0 && this.hitFlash % 2 === 0) {
      ctx.fillStyle = '#fff';
    } else {
      ctx.fillStyle = this.color;
    }
    ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);

    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-this.size - 4, -this.size, 8, this.size * 2);
    ctx.fillRect(this.size - 4, -this.size, 8, this.size * 2);

    ctx.fillStyle = '#ddd';
    ctx.fillRect(-3, -this.size - 10, 6, this.size + 6);

    ctx.fillStyle = this.team === TEAM.PLAYER ? '#4ecca3' : '#e94560';
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // 标签
    ctx.textAlign = 'center';
    const labelY = this.maxHp > 1 ? y - this.size - 26 : y - this.size - 16;
    if (this.isPlayer) {
      ctx.fillStyle = '#4ecca3';
      ctx.font = 'bold 10px "Microsoft YaHei", sans-serif';
      ctx.fillText('★ 玩家 ★', x, labelY);
    } else if (this.team === TEAM.PLAYER) {
      ctx.fillStyle = '#5dade2';
      ctx.font = 'bold 10px "Microsoft YaHei", sans-serif';
      ctx.fillText('队友', x, labelY);
    } else {
      ctx.fillStyle = '#ff6b6b';
      ctx.font = 'bold 10px "Microsoft YaHei", sans-serif';
      ctx.fillText('敌人', x, labelY);
    }
  }
}

// ---- Bullet class ----
class Bullet {
  constructor(x, y, dir, team) {
    this.x = x;
    this.y = y;
    this.dir = { x: dir.x, y: dir.y };
    this.team = team;
    this.speed = 6;
    this.alive = true;
    this.trail = [];
    this.bounces = 3;
  }

  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 8) this.trail.shift();

    const prevCol = Math.floor(this.x / TILE);
    const prevRow = Math.floor(this.y / TILE);

    this.x += this.dir.x * this.speed;
    this.y += this.dir.y * this.speed;
    const col = Math.floor(this.x / TILE);
    const row = Math.floor(this.y / TILE);
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) {
      this.alive = false;
      return;
    }
    const w = walls[row][col];
    if (w === 1) {
      walls[row][col] = 0;
      spawnParticles(col * TILE + TILE/2, row * TILE + TILE/2, '#d4a574');
      this.alive = false;
    } else if (w === 2) {
      this.bounces--;
      if (this.bounces <= 0) {
        spawnParticles(this.x, this.y, '#ffdd57');
        this.alive = false;
        return;
      }
      if (prevCol !== col) this.dir.x = -this.dir.x;
      if (prevRow !== row) this.dir.y = -this.dir.y;
      this.x -= this.dir.x * this.speed * 2;
      this.y -= this.dir.y * this.speed * 2;
      spawnParticles(this.x, this.y, '#ffdd57');
      this.trail = [];
    }
  }

  draw(ctx) {
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const alpha = (i / this.trail.length) * 0.5;
      const size = 2 + (i / this.trail.length) * 3;
      ctx.fillStyle = this.team === TEAM.PLAYER
        ? `rgba(78, 204, 163, ${alpha})`
        : `rgba(233, 69, 96, ${alpha})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = this.team === TEAM.PLAYER ? '#ffdd57' : '#ff4757';
    ctx.shadowColor = this.team === TEAM.PLAYER ? '#4ecca3' : '#e94560';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ---- MuzzleFlash class ----
class MuzzleFlash {
  constructor(x, y, dir) {
    this.x = x + dir.x * 20;
    this.y = y + dir.y * 20;
    this.life = 5;
  }
  update() { this.life--; }
  draw(ctx) {
    if (this.life <= 0) return;
    const alpha = this.life / 5;
    const r = 12 * alpha;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    grad.addColorStop(0, 'rgba(255, 255, 200, 1)');
    grad.addColorStop(0.4, 'rgba(255, 200, 50, 0.7)');
    grad.addColorStop(1, 'rgba(255, 100, 0, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ---- Particle class ----
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 15 + Math.random() * 10;
    this.size = 2 + Math.random() * 3;
  }
  update() { this.x += this.vx; this.y += this.vy; this.life--; }
  draw(ctx) {
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.life / 25;
    ctx.fillRect(this.x, this.y, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    particles.push(new Particle(x, y, color));
  }
}

// ---- XP Orb management ----
function isTileBlocked(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return true;
  if (walls[row][col] !== 0) return true;
  // 检查是否有坦克在这个格子里
  const cx = col * TILE + TILE/2;
  const cy = row * TILE + TILE/2;
  const allTanks = [player, ...enemies, ...teammates].filter(t => t && t.alive);
  for (const t of allTanks) {
    const dx = cx - t.x;
    const dy = cy - t.y;
    if (Math.sqrt(dx*dx + dy*dy) < TILE) return true;
  }
  // 检查是否和已有的球重叠
  for (const o of xpOrbs) {
    const dx = cx - o.x;
    const dy = cy - o.y;
    if (Math.sqrt(dx*dx + dy*dy) < TILE * 0.8) return true;
  }
  return false;
}

function spawnXPOrb() {
  if (xpOrbs.length >= 10) return; // 最多10个同时存在
  const col = 1 + Math.floor(Math.random() * (COLS - 2));
  const row = 1 + Math.floor(Math.random() * (ROWS - 2));
  if (!isTileBlocked(col, row)) {
    xpOrbs.push(new XPOrb(col * TILE + TILE/2, row * TILE + TILE/2));
  }
}

// ---- Map ----
function buildMap() {
  const w = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

  // 边界钢铁墙
  for (let r = 0; r < ROWS; r++) {
    w[r][0] = 2; w[r][COLS - 1] = 2;
  }
  for (let c = 0; c < COLS; c++) {
    w[0][c] = 2; w[ROWS - 1][c] = 2;
  }

  // 适配22x22大地图的掩体布局
  const patterns = [
    // 四角砖墙
    [2,2,1],[3,2,1],[4,2,1],[2,3,1],[3,3,1],[2,4,1],
    [17,2,1],[18,2,1],[19,2,1],[18,3,1],[19,3,1],[19,4,1],
    [2,17,1],[3,17,1],[4,17,1],[2,18,1],[3,18,1],[2,19,1],
    [17,17,1],[18,17,1],[19,17,1],[17,18,1],[18,18,1],[17,19,1],

    // 中心区域
    [10,10,1],[11,10,1],[10,11,1],[11,11,1],[10,12,1],[11,12,1],

    // 左区砖墙+钢铁
    [5,9,1],[5,10,1],[5,11,1],[5,12,1],[6,9,2],[6,10,2],[6,11,2],[6,12,2],

    // 右区砖墙+钢铁
    [15,9,1],[15,10,1],[15,11,1],[15,12,1],[16,9,2],[16,10,2],[16,11,2],[16,12,2],

    // 上区砖墙+钢铁
    [9,5,1],[10,5,1],[11,5,1],[12,5,1],[9,6,2],[10,6,2],[11,6,2],[12,6,2],

    // 下区砖墙+钢铁
    [9,15,1],[10,15,1],[11,15,1],[12,15,1],[9,16,2],[10,16,2],[11,16,2],[12,16,2],

    // 散落砖墙
    [7,7,1],[8,7,1],[13,7,1],[14,7,1],
    [7,14,1],[8,14,1],[13,14,1],[14,14,1],
    [4,7,1],[4,8,1],[17,7,1],[17,8,1],
    [4,13,1],[4,14,1],[17,13,1],[17,14,1],
    [7,4,1],[8,4,1],[13,4,1],[14,4,1],
    [7,17,1],[8,17,1],[13,17,1],[14,17,1],

    // 钢铁柱
    [7,5,2],[14,5,2],[7,16,2],[14,16,2],
    [4,4,2],[17,4,2],[4,17,2],[17,17,2],
    [3,10,2],[3,11,2],[18,10,2],[18,11,2],
    [10,3,2],[11,3,2],[10,18,2],[11,18,2],

    // 走廊掩体
    [7,2,1],[8,2,1],[13,2,1],[14,2,1],
    [2,8,1],[2,9,1],[19,8,1],[19,9,1],
    [7,19,1],[8,19,1],[13,19,1],[14,19,1],
    [2,12,1],[2,13,1],[19,12,1],[19,13,1],

    // 中层掩体
    [7,8,1],[7,9,1],[14,8,1],[14,9,1],
    [8,13,1],[13,13,1],[8,8,1],[13,8,1],

    // 额外砖墙
    [3,6,1],[18,6,1],[3,15,1],[18,15,1],
    [6,3,1],[15,3,1],[6,18,1],[15,18,1],
    [9,3,2],[12,3,2],[9,18,2],[12,18,2],
    [3,7,2],[18,7,2],[3,14,2],[18,14,2],

    // 出生点附近保护
    [6,19,1],[7,19,1],[8,19,1],[9,19,1],[10,19,1],[11,19,1],[12,19,1],[13,19,1],[14,19,1],[15,19,1],
    [10,18,1],[11,18,1],
    [1,6,1],[1,7,1],[20,6,1],[20,7,1],
    [1,14,1],[1,15,1],[20,14,1],[20,15,1],

    // 更多散落
    [5,3,1],[16,3,1],[5,18,1],[16,18,1],
    [8,11,1],[13,11,1],[8,10,1],[13,10,1],
  ];

  for (const [c, r, type] of patterns) {
    if (r > 0 && r < ROWS - 1 && c > 0 && c < COLS - 1) {
      w[r][c] = type;
    }
  }

  return w;
}

function drawWalls() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * TILE, y = r * TILE;
      if (walls[r][c] === 1) {
        ctx.fillStyle = '#c97a3b'; ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#a05a2c';
        ctx.fillRect(x, y, TILE/2, TILE/2);
        ctx.fillRect(x + TILE/2, y + TILE/2, TILE/2, TILE/2);
        ctx.strokeStyle = '#8b4513'; ctx.lineWidth = 0.5;
        ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
      } else if (walls[r][c] === 2) {
        ctx.fillStyle = '#7a7a7a'; ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#999';
        ctx.fillRect(x + 3, y + 3, TILE - 6, TILE - 6);
        ctx.fillStyle = '#555'; ctx.fillRect(x + 10, y + 10, 5, 5);
        ctx.fillStyle = '#bbb';
        ctx.beginPath();
        ctx.moveTo(x + TILE/2, y + 3);
        ctx.lineTo(x + TILE - 3, y + TILE/2);
        ctx.lineTo(x + TILE/2, y + TILE - 3);
        ctx.lineTo(x + 3, y + TILE/2);
        ctx.closePath(); ctx.fill();
      }
    }
  }
}

// ---- Spawning ----
function spawnEnemy(hp = 1) {
  const spawnPoints = [
    { c: 1, d: DIR.RIGHT },
    { c: COLS - 2, d: DIR.LEFT },
    { c: Math.floor(COLS / 2), d: DIR.DOWN }
  ];
  const sp = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
  const colors = ['#e94560', '#ff6b6b', '#c0392b', '#e74c3c', '#ff4757'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const enemy = new Tank(sp.c, 1, sp.d, color, TEAM.ENEMY, hp);
  if (!enemy.collidesAt(enemy.x, enemy.y)) {
    enemies.push(enemy);
    enemiesRemaining++;
  }
}

function spawnTeammate() {
  const spawnPoints = [
    { c: 1, d: DIR.RIGHT },
    { c: COLS - 2, d: DIR.LEFT },
  ];
  const sp = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
  const teammate = new Tank(sp.c, ROWS - 2, sp.d, '#5dade2', TEAM.PLAYER, 2);
  if (!teammate.collidesAt(teammate.x, teammate.y)) {
    teammates.push(teammate);
  }
}

// ---- Messages ----
function showWaveMsg(text, duration) {
  waveMsg.textContent = text;
  waveMsg.style.opacity = '1';
  setTimeout(() => { waveMsg.style.opacity = '0'; }, duration);
}

function showLevelUp(level) {
  levelUpMsg.textContent = '⬆ 升级! Lv.' + level + '  +1生命 ⬆';
  levelUpMsg.style.opacity = '1';
  setTimeout(() => { levelUpMsg.style.opacity = '0'; }, 2000);
}

function updateXPBar() {
  if (!player || !player.isPlayer) return;
  const pct = (player.xp / player.xpToNext) * 100;
  xpBarInner.style.width = pct + '%';
  xpText.textContent = player.xp + ' / ' + player.xpToNext;
  xpLevelEl.textContent = player.xpLevel;
}

// ---- Wave system ----
function startNextWave() {
  wave++;
  if (wave > 5) {
    gameWon = true;
    gameOver = true;
    gamePaused = true;
    gameOverMsg.textContent = '你赢了!\n按 R 重新开始';
    gameOverMsg.style.display = 'block';
    return;
  }

  gamePaused = true;

  const config = {
    1: { enemies: 1, enemyHp: 1, teammates: 0, delay: 0, label: '1v1 热身' },
    2: { enemies: 2, enemyHp: 1, teammates: 0, delay: 800, label: '1v2 加码' },
    3: { enemies: 2, enemyHp: 2, teammates: 1, delay: 800, label: '2v2 队友来了' },
    4: { enemies: 3, enemyHp: 2, teammates: 1, delay: 700, label: '2v3 强敌' },
    5: { enemies: 4, enemyHp: 2, teammates: 2, delay: 600, label: '2v4 决战' },
  };

  const cfg = config[wave];
  showWaveMsg('第 ' + wave + ' 波 - ' + cfg.label, 2500);

  setTimeout(() => {
    gamePaused = false;

    const targetTeammates = cfg.teammates;
    while (teammates.length < targetTeammates) {
      spawnTeammate();
    }

    const totalEnemies = cfg.enemies;
    enemiesRemaining = totalEnemies;
    for (let i = 0; i < totalEnemies; i++) {
      setTimeout(() => {
        if (!gameOver) spawnEnemy(cfg.enemyHp);
      }, i * cfg.delay);
    }
  }, 2600);
}

// ---- Init / Reset ----
function initGame() {
  walls = buildMap();
  player = new Tank(Math.floor(COLS / 2), ROWS - 2, DIR.UP, '#4ecca3', TEAM.PLAYER, 3);
  enemies = [];
  teammates = [];
  bullets = [];
  particles = [];
  muzzleFlashes = [];
  xpOrbs = [];
  score = 0;
  kills = 0;
  wave = 0;
  gameOver = false;
  gameWon = false;
  gamePaused = false;
  enemiesRemaining = 0;
  gameOverMsg.style.display = 'none';
  updateXPBar();
  updateUI();
  canvas.focus();
  startNextWave();
}

function updateUI() {
  scoreEl.textContent = score;
  livesEl.textContent = player.hp + ' / ' + player.maxHp;
  killsEl.textContent = kills;
}

// ---- Input ----
const keys = {};

window.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code.startsWith('Arrow') ||
      e.code === 'KeyW' || e.code === 'KeyA' || e.code === 'KeyS' || e.code === 'KeyD' ||
      e.code === 'KeyJ' || e.code === 'KeyR') {
    e.preventDefault();
  }
  keys[e.code] = true;
  if (e.code === 'KeyR' && gameOver) {
    initGame();
    return;
  }
});

window.addEventListener('keyup', function(e) {
  if (e.code === 'Space' || e.code.startsWith('Arrow') ||
      e.code === 'KeyW' || e.code === 'KeyA' || e.code === 'KeyS' || e.code === 'KeyD' ||
      e.code === 'KeyJ') {
    e.preventDefault();
  }
  keys[e.code] = false;
});

function handleInput() {
  if (!player || !player.alive || gameOver || gamePaused) return;
  if (keys['ArrowUp'] || keys['KeyW'])    player.move(DIR.UP);
  if (keys['ArrowDown'] || keys['KeyS'])  player.move(DIR.DOWN);
  if (keys['ArrowLeft'] || keys['KeyA'])  player.move(DIR.LEFT);
  if (keys['ArrowRight'] || keys['KeyD']) player.move(DIR.RIGHT);
  if (keys['Space'] || keys['KeyJ'])      player.shoot();
}

// ---- Teammate AI ----
function updateTeammates() {
  for (const t of teammates) {
    if (!t.alive) continue;
    t.update();

    let nearest = null;
    let nearestDist = Infinity;
    for (const e of enemies) {
      if (!e.alive) continue;
      const dx = e.x - t.x;
      const dy = e.y - t.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < nearestDist) {
        nearestDist = dist;
        nearest = e;
      }
    }

    if (nearest && t.shootCooldown <= 0) {
      const dx = nearest.x - t.x;
      const dy = nearest.y - t.y;
      const aimDir = Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? DIR.RIGHT : DIR.LEFT)
        : (dy > 0 ? DIR.DOWN : DIR.UP);
      if (aimDir.x === t.dir.x && aimDir.y === t.dir.y && Math.random() < 0.6) {
        t.shoot();
      }
    }

    t.aiDirTimer--;
    if (t.aiDirTimer <= 0) {
      if (nearest) {
        const dx = nearest.x - t.x;
        const dy = nearest.y - t.y;
        let preferred;
        if (Math.abs(dx) > Math.abs(dy)) {
          preferred = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        } else {
          preferred = dy > 0 ? DIR.DOWN : DIR.UP;
        }
        if (nearestDist > 100) {
          t.move(preferred);
        } else if (nearestDist < 60) {
          t.move({ x: -preferred.x, y: -preferred.y, a: preferred.a + Math.PI });
        }
      }
      const dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
      t.move(dirs[Math.floor(Math.random() * 4)]);
      t.aiDirTimer = 25 + Math.floor(Math.random() * 35);
    } else {
      if (!t.move(t.dir)) {
        const dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
        t.move(dirs[Math.floor(Math.random() * 4)]);
      }
    }
  }
}

// ---- Enemy AI ----
function updateEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    e.update();

    const friendlies = [player, ...teammates].filter(t => t.alive);
    let target = null;
    let minDist = Infinity;
    for (const f of friendlies) {
      const dx = f.x - e.x;
      const dy = f.y - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < minDist) { minDist = dist; target = f; }
    }

    if (target && e.shootCooldown <= 0) {
      const dx = target.x - e.x;
      const dy = target.y - e.y;
      const aimDir = Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? DIR.RIGHT : DIR.LEFT)
        : (dy > 0 ? DIR.DOWN : DIR.UP);
      if (aimDir.x === e.dir.x && aimDir.y === e.dir.y && Math.random() < 0.5) {
        e.shoot();
      }
    }

    e.aiDirTimer--;
    if (e.aiDirTimer <= 0) {
      if (target) {
        const dx = target.x - e.x;
        const dy = target.y - e.y;
        const preferred = Math.abs(dx) > Math.abs(dy)
          ? (dx > 0 ? DIR.RIGHT : DIR.LEFT)
          : (dy > 0 ? DIR.DOWN : DIR.UP);
        if (Math.random() < 0.35) e.move(preferred);
      }
      const dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
      e.move(dirs[Math.floor(Math.random() * 4)]);
      e.aiDirTimer = 30 + Math.floor(Math.random() * 50);
    } else {
      if (!e.move(e.dir)) {
        const dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
        e.move(dirs[Math.floor(Math.random() * 4)]);
      }
    }
  }
}

// ---- XP Orb collision ----
function checkXPOrbs() {
  if (!player || !player.alive || gamePaused) return;
  for (let i = xpOrbs.length - 1; i >= 0; i--) {
    const o = xpOrbs[i];
    const dx = player.x - o.x;
    const dy = player.y - o.y;
    if (Math.sqrt(dx*dx + dy*dy) < player.size + 10) {
      player.addXP(o.value);
      spawnParticles(o.x, o.y, '#ffd700');
      xpOrbs.splice(i, 1);
    }
  }
}

// ---- Collision detection ----
function checkCollisions() {
  for (const b of bullets) {
    if (!b.alive) continue;

    if (b.team === TEAM.PLAYER) {
      for (const e of enemies) {
        if (!e.alive) continue;
        const dx = b.x - e.x;
        const dy = b.y - e.y;
        if (Math.sqrt(dx*dx + dy*dy) < e.size + 6) {
          b.alive = false;
          spawnParticles(b.x, b.y, '#ffdd57');
          if (e.takeDamage()) {
            spawnParticles(e.x, e.y, e.color);
            score += 100;
            kills++;
            enemiesRemaining--;
          }
          updateUI();
          break;
        }
      }
    } else {
      const friendlies = [player, ...teammates].filter(t => t.alive);
      for (const f of friendlies) {
        const dx = b.x - f.x;
        const dy = b.y - f.y;
        if (Math.sqrt(dx*dx + dy*dy) < f.size + 6) {
          b.alive = false;
          spawnParticles(b.x, b.y, '#ff4757');
          if (f.takeDamage()) {
            spawnParticles(f.x, f.y, f.color);
            if (f.isPlayer) {
              updateUI();
              updateXPBar();
              if (player.hp <= 0) {
                gameOver = true;
                gamePaused = true;
                gameOverMsg.style.display = 'block';
              }
            }
          }
          updateUI();
          break;
        }
      }
    }
  }
}

// ---- Wave management ----
function checkWave() {
  if (gamePaused || gameOver) return;
  const aliveEnemies = enemies.filter(e => e.alive).length;
  if (aliveEnemies === 0 && enemiesRemaining <= 0) {
    startNextWave();
  }
}

// ---- Game Loop ----
let orbSpawnTimer = 0;

function update() {
  if (gameOver) return;
  if (gamePaused) {
    for (const p of particles) p.update();
    for (const mf of muzzleFlashes) mf.update();
    for (const o of xpOrbs) o.update();
    particles = particles.filter(p => p.life > 0);
    muzzleFlashes = muzzleFlashes.filter(mf => mf.life > 0);
    return;
  }

  handleInput();
  player.update();
  updateTeammates();
  updateEnemies();

  for (const b of bullets) b.update();
  checkCollisions();
  checkXPOrbs();

  for (const p of particles) p.update();
  for (const mf of muzzleFlashes) mf.update();
  for (const o of xpOrbs) o.update();

  // 每2秒尝试生成经验球
  orbSpawnTimer++;
  if (orbSpawnTimer > 120) {
    orbSpawnTimer = 0;
    if (Math.random() < 0.6) spawnXPOrb();
  }

  bullets = bullets.filter(b => b.alive);
  enemies = enemies.filter(e => e.alive);
  teammates = teammates.filter(t => t.alive);
  particles = particles.filter(p => p.life > 0);
  muzzleFlashes = muzzleFlashes.filter(mf => mf.life > 0);

  checkWave();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.strokeRect(c * TILE, r * TILE, TILE, TILE);
    }
  }

  drawWalls();

  // 经验球
  for (const o of xpOrbs) o.draw(ctx);

  for (const p of particles) p.draw(ctx);
  for (const b of bullets) b.draw(ctx);
  for (const mf of muzzleFlashes) mf.draw(ctx);
  for (const e of enemies) e.draw(ctx);
  for (const t of teammates) t.draw(ctx);
  player.draw(ctx);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px "Courier New"';
  ctx.fillText('第 ' + wave + ' 波', 10, 18);

  if (gamePaused) {
    ctx.fillStyle = '#f5c518';
    ctx.font = 'bold 16px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('准备中...', canvas.width / 2, canvas.height / 2 + 30);
    ctx.textAlign = 'start';
  }

  if (player.alive && player.shootCooldown <= 0 && !gamePaused) {
    ctx.fillStyle = '#4ecca3';
    ctx.font = '12px "Courier New"';
    ctx.fillText('🔫 就绪', canvas.width - 70, 18);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

initGame();
gameLoop();

})();
</script>
